name: Daily Blog Post Generator

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional: specific topic'
        required: false
        default: ''
      language:
        description: 'Language: english, punjabi, or hindi'
        required: false
        default: 'english'

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_TOPIC: ${{ github.event.inputs.topic }}
          LANGUAGE: ${{ github.event.inputs.language || 'english' }}
        run: node scripts/generate-post.js

      - name: Commit and push new post
        run: |
          git config --local user.email "blog@wealthtalkwithekbir.ca"
          git config --local user.name "WealthTalk Auto-Blog"
          git add blog/ index.html
          git diff --staged --quiet || git commit -m "Auto blog post: $(date +'%Y-%m-%d')"
          git push
